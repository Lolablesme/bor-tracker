<!doctype html>

<html xmlns="http://www.w3.org/1999/html">
<head>
    <!-- Recommended meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <!-- PyScript CSS -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.8.1/core.css">
    <!-- CSS for examples -->
    <link rel="stylesheet" href="assets/css/style.css"/>

    <!-- This script tag bootstraps Plotly -->
    <script src="https://cdn.plot.ly/plotly-3.4.0.min.js" charset="utf-8"></script>

    <!-- This script tag bootstraps PyScript -->
    <script type="module" src="https://pyscript.net/releases/2025.8.1/core.js"></script>

    <!-- for splashscreen -->
    <style>
        #loading { outline: none; border: none; background: transparent }
    </style>
    <script type="module">
        const loading = document.getElementById('loading');
        loading.showModal();
    </script>
    <py-config>
        packages = ["beautifulsoup4", "pandas", "requests", "openpyxl", "plotly"]
    </py-config>

    <title>BOR Tracker</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png"/>
</head>

<body>
<dialog id="loading">
    <h1>Loading...</h1>
</dialog>

<nav class="navbar" style="background-color: #000000">
    <div class="app-header">
        <a class="title" href="https://lolablesme.github.io/bor-tracker/" style="color: #f0ab3c"><strong>Bed Occupancy Rate (Singapore)</strong></a>
    </div>
</nav>

<main>

    <div class="container" id="script-area">
        <section class="pyscript">
            <p>
                Data taken from <br/>
                <a href="https://www.moh.gov.sg/others/resources-and-statistics/healthcare-institution-statistics-beds-occupancy-rate-(bor)/">
                https://www.moh.gov.sg/others/resources-and-statistics/healthcare-institution-statistics-beds-occupancy-rate-(bor)/</a>
            </p>

            <script type="py" src="bor-logic.py">
            </script>
        </section>
    </div>
</main>

<div class="wrapper-footer">
    <div class="container">
        <footer id="footer">
        </footer>
        <script>
            fetch('includes/svg-icons.html')
                 .then(response => response.text())
                 .then(data => {
                   document.getElementById('footer').innerHTML = data;
                 });
        </script>
    </div>
</div>
</body>
</html>
